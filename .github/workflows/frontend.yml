name: Frontend — Build & Push

on:
  push:
    tags:
      - "frontend/v[0-9]+.[0-9]+.[0-9]+"
      - "frontend/v[0-9]+.[0-9]+.[0-9]+-preview.*"

concurrency:
  group: ${{ contains(github.ref, '-preview.') && 'frontend-build-preview' || 'frontend-build-production' }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/frontend/v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "📦 Frontend version: ${VERSION}"

          if [[ ! "$VERSION" =~ -preview\. ]]; then
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for existing preview image
        id: check_preview
        if: steps.version.outputs.is_stable == 'true'
        run: |
          BASE_VERSION="${{ steps.version.outputs.version }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          LATEST_PREVIEW=""
          for i in $(seq 20 -1 1); do
            TAG="${BASE_VERSION}-preview.${i}"
            if docker manifest inspect "${IMAGE}:${TAG}" > /dev/null 2>&1; then
              LATEST_PREVIEW="${TAG}"
              break
            fi
          done

          if [[ -n "$LATEST_PREVIEW" ]]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "preview_tag=${LATEST_PREVIEW}" >> "$GITHUB_OUTPUT"
            echo "✅ Found preview image: ${IMAGE}:${LATEST_PREVIEW}"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No preview image found, will build from source"
          fi

      - name: Retag preview image as stable
        if: steps.check_preview.outputs.found == 'true'
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          PREVIEW="${{ steps.check_preview.outputs.preview_tag }}"
          STABLE="${{ steps.version.outputs.version }}"

          echo "🔄 Retagging ${IMAGE}:${PREVIEW} → ${IMAGE}:${STABLE}"
          docker buildx imagetools create \
            --tag "${IMAGE}:${STABLE}" \
            "${IMAGE}:${PREVIEW}"
          echo "✅ Successfully retagged as ${IMAGE}:${STABLE}"

      - name: Set up Docker Buildx
        if: steps.check_preview.outputs.found != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        if: steps.check_preview.outputs.found != 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and push Docker image
        if: steps.check_preview.outputs.found != 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
